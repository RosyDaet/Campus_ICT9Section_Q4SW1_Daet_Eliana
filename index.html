<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <form id="login-form" class="container mt-5" action="#" method="post">

        <h1 class="mb-4">Login</h1>

        <details class="mb-3">
            <summary>Login Instructions</summary>
            <p>Enter your username and password.</p>
        </details>

        <h2>Username</h2>
        <input type="text" class="form-control mb-3" id="username" placeholder="Enter username" required>

        <h2>Password</h2>
        <input type="password" class="form-control mb-3" id="password" placeholder="Enter password" required>

        <div class="d-grid mb-3">
            <button class="btn btn-info" type="button" onclick="checkLogin()">Login</button>
        </div>

        <p id="login-message" class="fw-bold"></p>

    </form>

    <script>
        const validUsername = "Tom Smith";
        const validPassword = "12345678"; 
        function checkLogin() {
        
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;
            let message = document.getElementById("login-message");

            if (username === validUsername && password === validPassword) {
                message.innerHTML = "Access Granted"
            } else {
                message.innerHTML = "Access Denied";
            }
        }
    </script>

</body>
</html>
